<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Strike: Marketplace</title>
    <link rel="stylesheet" href="CSS/marketplace.css">
</head>
<body>
        <main>
        <div class="tabs">
            <button class="button" id="return-button">Return To Main Menu</button>
            <button class="tab" data-category="cases">Cases</button>
            <button class="tab" data-category="skins">Skins</button>
        </div>

        <div id="cases" class="items category">
            <div class="item">
                <img src="Assets/Cases/kilowatt-case.png" alt="Kilowatt Case">
                <div class="info">
                    <h3>Kilowatt Case</h3>
                    <p class="price">$3.00</p>
                    <button>Buy</button>
                </div>
            </div>
            <div class="item">
                <img src="Assets/Cases/gallery-case.png" alt="Gallery Case">
                <div class="info">
                    <h3>Gallery Case</h3>
                    <p class="price">$3.00</p>
                    <button>Buy</button>
                </div>
            </div>
            <div class="item">
                <img src="Assets/Cases/fever-case.png" alt="Fever Case">
                <div class="info">
                    <h3>Fever Case</h3>
                    <p class="price">$3.00</p>
                    <button>Buy</button>
                </div>
            </div>
        </div>

        <div id="skins" class="items category" style="display: none;">
             <div class="item">
                <img src="Assets/Skins/ak47-alice.png" alt="AK-47 | Alice">
                <div class="info">
                    <h3>AK-47 | Alice</h3>
                    <p class="price">$8,000</p>
                    <button>Buy</button>
                </div>
            </div>
            <div class="item">
                <img src="Assets/Skins/awp-dragon-lore.png" alt="AWP | Dragon Lore">
                <div class="info">
                    <h3>AWP | Dragon Lore</h3>
                    <p class="price">$11,244</p>
                    <button>Buy</button>
                </div>
            </div>
            <div class="item">
                <img src="Assets/Skins/usps-printstream.png" alt="USPS | Printstream">
                <div class="info">
                    <h3>USPS | Printstream</h3>
                    <p class="price">$113</p>
                    <button>Buy</button>
                </div>
            </div>
            <div class="item">
                <img src="Assets/Skins/glock18-fully-tuned.png" alt="Glock 18 | Fully Tuned">
                <div class="info">
                    <h3>Glock 18 | Fully Tuned</h3>
                    <p class="price">$205</p>
                    <button>Buy</button>
                </div>
            </div>
            <div class="item">
                <img src="Assets/Skins/glock-18-neo-noir.png" alt="Glock-18 | Neo-Noir">
                <div class="info">
                    <h3>Glock-18 | Neo-Noir</h3>
                    <p class="price">$199</p>
                    <button>Buy</button>
                </div>
            </div>
            <div class="item">
                <img src="Assets/Skins/glock-18-dragon-tattoo.png" alt="Glock-18 | Dragon Tattoo">
                <div class="info">
                    <h3>Glock-18 | Dragon Tattoo</h3>
                    <p class="price">$136</p>
                    <button>Buy</button>
                </div>
            </div>
        </div>
    </main>
    <script src="JS/main.js"></script>
    <script> document.getElementById('return-button').addEventListener('click', function() {
        window.location.href = 'index.html';
    }); </script>
</body>
</html>
