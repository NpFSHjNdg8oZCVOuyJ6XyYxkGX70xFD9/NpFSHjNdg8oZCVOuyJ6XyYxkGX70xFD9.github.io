<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Strike: Inventory</title>
    <link rel="stylesheet" href="CSS/inventory.css">
</head>
<body>
    <div class="header">
        <button class="button" id="return-button">Return to Main Menu</button>
        <h1>Your Inventory</h1>
    </div>

    <div class="inventory-grid" id="inventory-items">

    </div>

    <script> 
        document.getElementById("return-button").addEventListener("click", function() {
            window.location.href = "index.html";
        }); 
    </script>

    <script>         
        const inventoryItems = document.getElementById('inventory-items');
        const inventory = JSON.parse(localStorage.getItem('inventory') || '[]');

        if (inventory.length === 0) {
            inventoryItems.innerHTML = '<p>no skins lol loser</p>';
        }

        inventory.forEach(function (skin) {
            const div = document.createElement('div');
            div.classList.add('item');
            div.innerHTML =
                '<img src="' + skin.image + '" alt="' + skin.name + '">' +
                '<div class="info">' +
                '<h3>' + skin.name + '</h3>' +
                '<p class="wear-rating">' + skin.wear + '</p>' +
                '<p class="price">$' + skin.price + '</p>' +
                '</div>';
            inventoryItems.appendChild(div);
        }); 
    </script>
</body>
</html>
